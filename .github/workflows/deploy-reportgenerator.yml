name: Deploy ReportGenerator to Azure App Service

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: denholtz-ir-hncfdvb6heegedgz.westus3-01
  PYTHON_VERSION: "3.14"
  DEPLOY_ZIP: reportgenerator-release.zip

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Validate Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build deployment archive
        run: |
          zip -r "${{ env.DEPLOY_ZIP }}" . \
            -x ".venv/*" \
               "__pycache__/*" \
               "*.pyc" \
               "data/*" \
               "outputs/*" \
               "*.log" \
               "juniper_debug_html/*" \
               ".env"

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ${{ env.DEPLOY_ZIP }}
